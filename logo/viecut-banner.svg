<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="260" rx="16" fill="url(#bg)"/>

  <!-- Left: Title and subtitle -->
  <text x="50" y="90" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="52" font-weight="700" fill="#e0e0e0" letter-spacing="3">
    <tspan fill="#ef5350">Vie</tspan><tspan fill="#e0e0e0">Cut</tspan>
  </text>
  <text x="50" y="125" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" fill="#90a4ae">
    Shared-Memory Minimum Cuts
  </text>
  <text x="50" y="155" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#607d8b">
    Inexact, Exact, Cactus, Multiterminal
  </text>

  <!-- Badge: Part of KaHIP -->
  <rect x="50" y="180" width="130" height="26" rx="13" fill="#263238"/>
  <text x="115" y="197" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#80cbc4" text-anchor="middle">Part of KaHIP</text>

  <!-- Right side: Graph with a minimum cut -->

  <!-- Left partition nodes -->
  <circle cx="500" cy="60" r="10" fill="#42a5f5"/>
  <circle cx="540" cy="120" r="10" fill="#42a5f5"/>
  <circle cx="490" cy="160" r="10" fill="#42a5f5"/>
  <circle cx="560" cy="200" r="10" fill="#42a5f5"/>
  <circle cx="480" cy="100" r="10" fill="#42a5f5"/>

  <!-- Left partition edges -->
  <line x1="508" y1="66" x2="534" y2="114" stroke="#42a5f5" stroke-width="2" opacity="0.5"/>
  <line x1="496" y1="68" x2="484" y2="94" stroke="#42a5f5" stroke-width="2" opacity="0.5"/>
  <line x1="486" y1="106" x2="492" y2="152" stroke="#42a5f5" stroke-width="2" opacity="0.5"/>
  <line x1="534" y1="126" x2="496" y2="156" stroke="#42a5f5" stroke-width="2" opacity="0.5"/>
  <line x1="546" y1="126" x2="556" y2="194" stroke="#42a5f5" stroke-width="2" opacity="0.5"/>
  <line x1="496" y1="166" x2="554" y2="196" stroke="#42a5f5" stroke-width="2" opacity="0.5"/>

  <!-- Right partition nodes -->
  <circle cx="720" cy="55" r="10" fill="#ff8a65"/>
  <circle cx="680" cy="110" r="10" fill="#ff8a65"/>
  <circle cx="740" cy="130" r="10" fill="#ff8a65"/>
  <circle cx="700" cy="185" r="10" fill="#ff8a65"/>
  <circle cx="760" cy="195" r="10" fill="#ff8a65"/>

  <!-- Right partition edges -->
  <line x1="714" y1="61" x2="686" y2="104" stroke="#ff8a65" stroke-width="2" opacity="0.5"/>
  <line x1="726" y1="61" x2="734" y2="124" stroke="#ff8a65" stroke-width="2" opacity="0.5"/>
  <line x1="686" y1="116" x2="734" y2="126" stroke="#ff8a65" stroke-width="2" opacity="0.5"/>
  <line x1="686" y1="116" x2="696" y2="179" stroke="#ff8a65" stroke-width="2" opacity="0.5"/>
  <line x1="746" y1="136" x2="756" y2="189" stroke="#ff8a65" stroke-width="2" opacity="0.5"/>
  <line x1="706" y1="189" x2="754" y2="195" stroke="#ff8a65" stroke-width="2" opacity="0.5"/>

  <!-- Cut line (bold red dashed, vertical-ish) -->
  <path d="M 615 25 Q 625 130, 615 240" stroke="#ef5350" stroke-width="3" fill="none" stroke-dasharray="10,6" opacity="0.8"/>

  <!-- Cut edges crossing the line -->
  <line x1="548" y1="120" x2="672" y2="110" stroke="#ef5350" stroke-width="2" opacity="0.6"/>
  <line x1="566" y1="200" x2="694" y2="185" stroke="#ef5350" stroke-width="2" opacity="0.6"/>

  <!-- Scissors icon near the cut -->
  <text x="625" y="145" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" fill="#ef5350" opacity="0.7">&#x2702;</text>

  <!-- Legend -->
  <line x1="810" y1="85" x2="840" y2="85" stroke="#42a5f5" stroke-width="2.5"/>
  <text x="848" y="89" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#a0a0a0">S</text>
  <line x1="810" y1="110" x2="840" y2="110" stroke="#ff8a65" stroke-width="2.5"/>
  <text x="848" y="114" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#a0a0a0">T</text>
  <line x1="810" y1="135" x2="840" y2="135" stroke="#ef5350" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="848" y="139" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#a0a0a0">cut</text>

  <!-- Bottom text -->
  <text x="620" y="248" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#546e7a" text-anchor="middle">
    shared-memory parallel minimum cut algorithms
  </text>
</svg>
